<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="buttons.css">
<style>
  body { margin: 0; background: #f0f0f1; font-family: 'Plus Jakarta Sans', sans-serif; padding: 48px; }
  h2 { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #737373; margin: 0 0 16px; }
  .section { margin-bottom: 40px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .label { font-size: 11px; color: #a3a3a3; width: 80px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="section">
  <h2>Primary</h2>
  <div class="row" style="margin-bottom:12px;">
    <span class="label">Medium · Default</span>
    <button class="btn btn-primary btn-md">Button</button>
  </div>
  <div class="row" style="margin-bottom:12px;">
    <span class="label">Medium · Hover</span>
    <button class="btn btn-primary btn-md" style="background:#464E53;">Button</button>
  </div>
  <div class="row" style="margin-bottom:12px;">
    <span class="label">Small · Default</span>
    <button class="btn btn-primary btn-sm">Button</button>
  </div>
  <div class="row">
    <span class="label">Small · Hover</span>
    <button class="btn btn-primary btn-sm" style="background:#464E53;">Button</button>
  </div>
</div>

<div class="section">
  <h2>Secondary</h2>
  <div class="row" style="margin-bottom:12px;">
    <span class="label">Medium · Default</span>
    <button class="btn btn-secondary btn-md">Button</button>
  </div>
  <div class="row" style="margin-bottom:12px;">
    <span class="label">Medium · Hover</span>
    <button class="btn btn-secondary btn-md" style="background:#F3F3F3;">Button</button>
  </div>
  <div class="row" style="margin-bottom:12px;">
    <span class="label">Small · Default</span>
    <button class="btn btn-secondary btn-sm">Button</button>
  </div>
  <div class="row">
    <span class="label">Small · Hover</span>
    <button class="btn btn-secondary btn-sm" style="background:#F3F3F3;">Button</button>
  </div>
</div>

</body>
</html>

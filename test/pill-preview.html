<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pill Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400&display=swap" rel="stylesheet">
<link href="Components/huc-components.css" rel="stylesheet">
<link rel="stylesheet" href="Components/headers.css">
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; padding: 40px; }
  h2 { font-size: 18px; color: #282E37; margin: 32px 0 12px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
</style>
</head>
<body>

<h2>Medium — no icon</h2>
<div class="row">
  <span class="pill pill-md pill-yellow">Yellow</span>
  <span class="pill pill-md pill-green">Green</span>
  <span class="pill pill-md pill-blue">Blue</span>
  <span class="pill pill-md pill-purple">Purple</span>
  <span class="pill pill-md pill-red">Red</span>
  <span class="pill pill-md pill-transparent">Transparent</span>
</div>

<h2>Medium — with leading icon</h2>
<div class="row">
  <span class="pill pill-md pill-icon pill-yellow">
    <svg class="pill-ico" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Yellow
  </span>
  <span class="pill pill-md pill-icon pill-green">
    <svg class="pill-ico" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Green
  </span>
  <span class="pill pill-md pill-icon pill-blue">
    <svg class="pill-ico" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Blue
  </span>
  <span class="pill pill-md pill-icon pill-purple">
    <svg class="pill-ico" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Purple
  </span>
  <span class="pill pill-md pill-icon pill-red">
    <svg class="pill-ico" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Red
  </span>
  <span class="pill pill-md pill-icon pill-transparent">
    <svg class="pill-ico" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 7v6M7 10h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Transparent
  </span>
</div>

<h2>Small — no icon</h2>
<div class="row">
  <span class="pill pill-sm pill-yellow">Yellow</span>
  <span class="pill pill-sm pill-green">Green</span>
  <span class="pill pill-sm pill-blue">Blue</span>
  <span class="pill pill-sm pill-purple">Purple</span>
  <span class="pill pill-sm pill-red">Red</span>
  <span class="pill pill-sm pill-transparent">Transparent</span>
</div>

<h2>Small — with leading icon</h2>
<div class="row">
  <span class="pill pill-sm pill-icon pill-yellow">
    <svg class="pill-ico" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 5.5v5M5.5 8h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    Yellow
  </span>
  <span class="pill pill-sm pill-icon pill-green">
    <svg class="pill-ico" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 5.5v5M5.5 8h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    Green
  </span>
  <span class="pill pill-sm pill-icon pill-blue">
    <svg class="pill-ico" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 5.5v5M5.5 8h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    Blue
  </span>
  <span class="pill pill-sm pill-icon pill-purple">
    <svg class="pill-ico" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 5.5v5M5.5 8h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    Purple
  </span>
  <span class="pill pill-sm pill-icon pill-red">
    <svg class="pill-ico" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 5.5v5M5.5 8h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    Red
  </span>
  <span class="pill pill-sm pill-icon pill-transparent">
    <svg class="pill-ico" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 5.5v5M5.5 8h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    Transparent
  </span>
</div>

</body>
</html>
